name: Android CI/CD Build & Distribute

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Secure APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission to Gradle
      run: chmod +x gradlew
      continue-on-error: true

    - name: Verify / repair Gradle wrapper jar
      run: |
        set -e
        DIST_URL=$(grep '^distributionUrl=' gradle/wrapper/gradle-wrapper.properties | cut -d'=' -f2- | sed 's/\\:/:/')
        if [ -f gradle/wrapper/gradle-wrapper.jar ] && unzip -tq gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
          echo "gradle-wrapper.jar is valid"
        else
          echo "gradle-wrapper.jar is missing or corrupted - re-downloading from $DIST_URL"
          ZIP=gradle-dist.zip
          curl -sSL "$DIST_URL" -o "$ZIP"
          UNZIP_DIR=$(mktemp -d)
          unzip -q "$ZIP" -d "$UNZIP_DIR"
          JAR_PATH=$(find "$UNZIP_DIR" -iname "gradle-wrapper*.jar" | head -n1)
          mkdir -p gradle/wrapper
          cp "$JAR_PATH" gradle/wrapper/gradle-wrapper.jar
          rm -rf "$ZIP" "$UNZIP_DIR"
          echo "gradle-wrapper.jar repaired"
        fi

    - name: Setup Android SDK Keys
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        echo "GEMINI_API_KEY=PLACEHOLDER" > .env.example

    - name: Reconstruct Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
        elif [ ! -f debug.keystore ]; then
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Set up Google Services File
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        if [ -n "$GOOGLE_SERVICES_JSON" ]; then
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
        elif [ ! -f app/google-services.json ]; then
          cp app/google-services.json.example app/google-services.json
        fi

    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-configuration-cache

    - name: Upload Built APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pulse-messenger-secure-apk
        path: app/build/outputs/apk/debug/app-debug.apk
