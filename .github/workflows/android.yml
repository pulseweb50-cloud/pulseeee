name: Android CI/CD Build & Distribute

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Secure APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK Keys
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        echo "GEMINI_API_KEY=PLACEHOLDER" > .env.example

    - name: Reconstruct Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
        elif [ ! -f debug.keystore ]; then
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Set up Google Services File
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        if [ -n "$GOOGLE_SERVICES_JSON" ]; then
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
        elif [ ! -f app/google-services.json ]; then
          cp app/google-services.json.example app/google-services.json
        fi

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1

    - name: Regenerate Gradle wrapper (fixes any corrupted gradle-wrapper.jar)
      run: gradle wrapper --gradle-version 9.3.1 --distribution-type bin

    - name: Grant Execute Permission to Gradle
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-configuration-cache

    - name: Upload Built APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pulse-messenger-secure-apk
        path: app/build/outputs/apk/debug/app-debug.apk
